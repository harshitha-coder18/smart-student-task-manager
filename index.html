<!DOCTYPE html>
<html>
<head>
    <title>Smart Student Task Manager</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #d6f0ff;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 25px;
            width: 320px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            color: #2e7d32;
        }

        p {
            color: #555;
            font-size: 14px;
        }

        .task-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background-color: #f1f1f1;
            padding: 10px;
            margin-top: 8px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Smart Task Manager</h1>
        <p>Manage your daily tasks efficiently</p>

        <div class="task-input">
            <input type="text" placeholder="Enter your task">
            <button>Add</button>
        </div>

        <ul>
            <li>Study C programming</li>
            <li>Practice CSS Flexbox</li>
        </ul>
    </div>

</body>
</html>
